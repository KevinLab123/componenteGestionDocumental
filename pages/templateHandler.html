<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link rel="stylesheet" href="../style.css">

<title>Manejador De Plantillas</title>
</head>

<body class="bg-light">

<div class="container-fluid py-3">

<!-- TOOLBAR PRINCIPAL -->
<div class="card shadow-sm mb-3">
<div class="card-body d-flex flex-wrap gap-2">

<button onclick="saveAsPDF()" class="btn btn-primary" id="btn-generate-pdf">
Generar PDF
</button>

<button onclick="handleSaveAction()" class="btn btn-success" id="btn-save">
Guardar Documento
</button>

<button class="btn btn-secondary"
id="btn-load-template"
onclick="loadTemplate()">
Cargar Plantilla
</button>

</div>
</div>

<div class="d-flex justify-content-center">

<div id="document-container" class="document-page">

<!-- ENCABEZADO -->
<div class="card shadow-sm mb-3">

<div class="card-header bg-light fw-semibold">
Encabezado
</div>

<div class="card-body">
<div id="doc-header"
     class="editor-section"
     contenteditable="true">
</div>
</div>

</div>


<!-- TOOLBAR DEL EDITOR -->
<div class="card shadow-sm mb-3 bg-light editor-toolbar">

<div class="card-body d-flex justify-content-center">

<div class="btn-toolbar gap-2 flex-wrap">

<div class="btn-group">
<button class="btn btn-outline-secondary" onclick="undo()">
<i class="bi bi-arrow-counterclockwise"></i>
</button>

<button class="btn btn-outline-secondary" onclick="redo()">
<i class="bi bi-arrow-clockwise"></i>
</button>
</div>


<div class="btn-group">
<button class="btn btn-outline-secondary" onclick="clearFormattingToParagraph()">
<i class="bi bi-eraser"></i>
</button>

<button class="btn btn-outline-secondary" onclick="bold()">
<i class="bi bi-type-bold"></i>
</button>

<button class="btn btn-outline-secondary" onclick="italic()">
<i class="bi bi-type-italic"></i>
</button>

<button class="btn btn-outline-secondary" onclick="underline()">
<i class="bi bi-type-underline"></i>
</button>

<button class="btn btn-outline-secondary" onclick="strikethrough()">
<i class="bi bi-type-strikethrough"></i>
</button>
</div>


<div class="btn-group">
<button class="btn btn-outline-secondary" onclick="alignText('left')">
<i class="bi bi-text-left"></i>
</button>

<button class="btn btn-outline-secondary" onclick="alignText('center')">
<i class="bi bi-text-center"></i>
</button>

<button class="btn btn-outline-secondary" onclick="alignText('right')">
<i class="bi bi-text-right"></i>
</button>
</div>


<div class="btn-group">
<button class="btn btn-outline-secondary" onclick="toggleList('ul')">
<i class="bi bi-list-ul"></i>
</button>

<button class="btn btn-outline-secondary" onclick="toggleList('ol')">
<i class="bi bi-list-ol"></i>
</button>
</div>


<div class="btn-group">

<button class="btn btn-outline-secondary" onclick="insertImageBase64()">
<i class="bi bi-image"></i>
</button>

<button class="btn btn-outline-primary" onclick="addLink()">
<i class="bi bi-link-45deg"></i>
</button>

</div>

</div>

</div>
</div>


<!-- CONTENIDO -->
<div class="card shadow mb-3">

<div class="card-header bg-light fw-semibold">
Contenido
</div>

<div class="card-body">

<div id="doc-body"
     class="editor-section"
     contenteditable="true">
</div>

</div>

</div>


<!-- PIE DE PAGINA -->
<div class="card shadow-sm">

<div class="card-header bg-light fw-semibold">
Pie de página
</div>

<div class="card-body">

<div id="doc-footer"
     class="editor-section footer-section">
</div>

</div>

</div>

</div>

</div>

</div>

<!-- PREVISUALIZADOR -->
<div class="row mt-4">
    <div class="col-12">
        <div class="card shadow-lg">
            <div class="card-header bg-dark text-white fw-semibold">
                Previsualización PDF
            </div>
            <div class="card-body bg-light">

                <div id="pdf-preview" class="pdf-preview-area">
                    <!-- Aquí se renderiza el documento final -->
                </div>

            </div>
        </div>
    </div>
</div>


<!-- Librerías -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/compressorjs@1.2.1/dist/compressor.min.js"></script>

<!-- Script -->
<script src="templateHandler.js"></script>

</body>
</html>
