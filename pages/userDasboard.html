<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Expediente Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-people-fill me-2"></i> Gestión de Usuarios
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0 text-primary">Listado de Usuarios</h5>
                <button class="btn btn-success btn-sm" onclick="openModal()">
                    <i class="bi bi-person-plus-fill me-1"></i> Nuevo Usuario
                </button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Usuario</th>
                                <th>Rol</th>
                                <th>Fecha Registro</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Nuevo Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="userForm">
                        <input type="hidden" id="userId">
                        <div class="mb-3">
                            <label class="form-label">Nombre de Usuario</label>
                            <input type="text" class="form-control" id="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="password" required>
                            <small class="text-muted" id="passHelp">Si editas, debes ingresarla para confirmar.</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Rol</label>
                            <select class="form-select" id="role" required>
                                <option value="admin">admin</option>
                                <option value="editor">editor</option>
                                <option value="viewer">viewer</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveUser()">Guardar Usuario</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_URL = 'http://localhost:3000/users';
        const userModal = new bootstrap.Modal(document.getElementById('userModal'));
        let isEditing = false;

        document.addEventListener('DOMContentLoaded', fetchUsers);

        async function fetchUsers() {
            try {
                const res = await fetch(API_URL);
                const users = await res.json();
                renderUsers(users);
            } catch (err) {
                console.error("Error al cargar usuarios:", err);
            }
        }

        function renderUsers(users) {
            const tableBody = document.getElementById('userTableBody');
            tableBody.innerHTML = '';
            users.forEach(user => {
                tableBody.innerHTML += `
                    <tr>
                        <td>${user.id}</td>
                        <td><strong>${user.username}</strong></td>
                        <td><span class="badge bg-info text-dark">${user.role}</span></td>
                        <td>${user.created_at ? new Date(user.created_at).toLocaleDateString() : 'N/A'}</td>
                        <td class="text-end">
                            <button class="btn btn-outline-primary btn-sm me-1" onclick="editUser(${user.id}, '${user.username}', '${user.role}')">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-outline-danger btn-sm" onclick="deleteUser(${user.id})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function openModal() {
            isEditing = false;
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = "";
            document.getElementById('modalTitle').innerText = "Nuevo Usuario";
            userModal.show();
        }

        async function saveUser() {
            const id = document.getElementById('userId').value;
            const userData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            const method = isEditing ? 'PUT' : 'POST';
            const url = isEditing ? `${API_URL}/${id}` : API_URL;

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const data = await res.json();

                if (res.ok) {
                    userModal.hide();
                    fetchUsers();
                } else {
                    // Muestra el error específico de la base de datos (como el de la restricción)
                    alert("Error: " + (data.message || data.error || "No se pudo guardar"));
                }
            } catch (err) {
                console.error(err);
                alert("Error crítico de conexión con el servidor");
            }
        }

        function editUser(id, username, role) {
            isEditing = true;
            document.getElementById('userId').value = id;
            document.getElementById('username').value = username;
            document.getElementById('role').value = role;
            document.getElementById('password').value = ""; 
            document.getElementById('modalTitle').innerText = "Editar Usuario";
            userModal.show();
        }

        async function deleteUser(id) {
            if (confirm('¿Estás seguro de eliminar este usuario?')) {
                try {
                    const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if(res.ok) fetchUsers();
                } catch (err) {
                    alert("No se pudo eliminar el usuario");
                }
            }
        }
    </script>
</body>
</html>
