<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">

    <title>Editor de Plantillas</title>
</head>

<body>

    <div class="container-fluid py-3">

        <!-- HEADER SUPERIOR -->
        <div class="row mb-3 sticky-toolbar">
            <div class="col">
                <div class="card shadow-sm">
                    <div class="card-body d-flex gap-3 align-items-center flex-wrap">

                        <input id="filename" type="text" class="form-control w-25" placeholder="Nombre del archivo"
                            value="Sin nombrar">
                        <!-- Archivo -->
                    <select class="form-select w-auto" onchange="handleFileMenu(this.value); this.selectedIndex=0;">
                        <option hidden selected>Archivo</option>
                        <option value="new">Nuevo</option>
                        <option value="pdf">Guardar PDF</option>
                        <option value="save">Guardar Plantilla</option>
                    </select>
                        <!-- Formato -->
                        <select class="form-select w-auto" onchange="setBlockFormat(this.value); this.selectedIndex=0;">
                            <option hidden selected>Formato</option>
                            <option value="h1">Encabezado 1</option>
                            <option value="h2">Encabezado 2</option>
                            <option value="h3">Encabezado 3</option>
                            <option value="h4">Encabezado 4</option>
                            <option value="h5">Encabezado 5</option>
                            <option value="h6">Encabezado 6</option>
                            <option value="p">Párrafo</option>
                        </select>
                        <!-- Fuente -->
                        <select class="form-select w-auto" onchange="setFontFamily(this.value); this.selectedIndex=0;">
                            <option hidden selected>Fuente</option>
                            <option value="Arial, sans-serif">Arial</option>
                            <option value="Segoe UI, sans-serif">Segoe UI</option>
                            <option value="Calibri, sans-serif">Calibri</option>
                            <option value="Verdana, sans-serif">Verdana</option>
                            <option value="Tahoma, sans-serif">Tahoma</option>
                            <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
                            <option value="Helvetica, sans-serif">Helvetica</option>
                            <option value="Georgia, serif">Georgia</option>
                            <option value="Times New Roman, serif">Times New Roman</option>
                            <option value="Cambria, serif">Cambria</option>
                            <option value="Garamond, serif">Garamond</option>
                            <option value="Consolas, monospace">Consolas</option>
                            <option value="Courier New, monospace">Courier New</option>
                            <option value="Lucida Console, monospace">Lucida Console</option>
                        </select>
                        <!-- Tamaño -->
                        <select class="form-select w-auto" onchange="setFontSize(this.value); this.selectedIndex=0;">
                            <option hidden selected>Tamaño</option>
                            <option value="10px">Pequeño</option>
                            <option value="12px">Normal</option>
                            <option value="18px">Grande</option>
                            <option value="24px">Extra Grande</option>
                        </select>
                        <!-- Página -->
                        <select class="form-select w-auto" onchange="setPageFormat(this.value); this.selectedIndex=0;">
                            <option hidden selected>Página</option>
                            <option value="A4">A4 (21×29.7 cm)</option>
                            <option value="LETTER">Carta (21.59×27.94 cm)</option>
                            <option value="LEGAL">Oficio (21.59×35.56 cm)</option>
                        </select>
                        <!-- Color texto -->
                        <input type="color" class="form-control form-control-color"
                            oninput="formatDoc('foreColor',this.value)">
                        <!-- Color fondo -->
                        <input type="color" class="form-control form-control-color"
                            oninput="formatDoc('hiliteColor',this.value)">
                    </div>
                </div>
            </div>
        </div>
        <!-- EDITORES -->
        <div class="row g-3">
            <!-- ENCABEZADO -->
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-light fw-semibold">
                        Encabezado
                    </div>
                    <!-- TOOLBAR -->
                    <div class="card-body border-bottom bg-white">
                        <div class="btn-toolbar gap-2 flex-wrap">

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="undo()">
                                    <i class="bi bi-arrow-counterclockwise"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="redo()">
                                    <i class="bi bi-arrow-clockwise"></i>
                                </button>
                            </div>

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="clearFormattingToParagraph()">
                                    <i class="bi bi-eraser"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="bold()">
                                    <i class="bi bi-type-bold"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="italic()">
                                    <i class="bi bi-type-italic"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="underline()">
                                    <i class="bi bi-type-underline"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="strikethrough()">
                                    <i class="bi bi-type-strikethrough"></i>
                                </button>
                                </button>
                            </div>

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="alignText('left')">
                                    <i class="bi bi-text-left"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="alignText('center')">
                                    <i class="bi bi-text-center"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="alignText('right')">
                                    <i class="bi bi-text-right"></i>
                                </button>
                            </div>

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="toggleList('ul')">
                                    <i class="bi bi-list-ul"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="toggleList('ol')">
                                    <i class="bi bi-list-ol"></i>
                                </button>
                            </div>

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="insertImageBase64()">
                                    <i class="bi bi-image"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="insertTable()">
                                    <i class="bi bi-table"></i>
                                </button>
                                <button class="btn btn-outline-primary" onclick="addLink()">
                                    <i class="bi bi-link-45deg"></i>
                                </button>
                                <button class="btn btn-outline-primary" onclick="openButtonModal()">
                                    <i class="bi bi-node-plus"></i>
                                </button>
                            </div>

                            <button class="btn btn-dark show-code">&lt;/&gt;</button>

                        </div>
                    </div>

                    <div class="card-body">
                        <div id="header-editor" class="form-control editor-section" style="min-height:150px;">

                            <table class="doc-header-table">
                                <tr>
                                    <td colspan="2" class="logo-cell">
                                        <!--  Contenedor SOLO para la imagen -->
                                        <div id="header-logo-container" class="header-logo-container"></div>
                                        <!--  Botón FUERA del contenedor dinámico -->
                                        <button id="insert-header-logo-btn" class="btn btn-outline-secondary"
                                            data-html2canvas-ignore="true" onclick="insertHeaderImage()">
                                            <i class="bi bi-image"></i> Insertar Logo
                                        </button>
                                    </td>
                                </tr>

                                <tr>
                                    <td class="label-cell">Consecutivo:</td>
                                    <td class="value-cell" contenteditable="true" data-variable="consecutivo">
  
                                    </td>
                                </tr>

                                <tr>
                                    <td class="label-cell">Departamento:</td>
                                    <td class="value-cell" contenteditable="true" data-variable="departamento">

                                    </td>
                                </tr>

                                <tr>
                                    <td class="label-cell">Fecha:</td>
                                    <td class="value-cell" contenteditable="true" data-variable="fecha">

                                    </td>
                                </tr>

                                <tr>
                                    <td colspan="2" class="title-cell" contenteditable="true" data-variable="titulo">

                                    </td>
                                </tr>
                            </table>

                        </div>
                    </div>
                </div>
            </div>

            <!-- CONTENIDO -->
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-header bg-light fw-semibold">
                        Contenido
                    </div>
                    <!-- TOOLBAR -->
                    <div class="card-body border-bottom bg-white">
                        <div class="btn-toolbar gap-2 flex-wrap">

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="undo()">
                                    <i class="bi bi-arrow-counterclockwise"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="redo()">
                                    <i class="bi bi-arrow-clockwise"></i>
                                </button>
                            </div>

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="clearFormattingToParagraph()">
                                    <i class="bi bi-eraser"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="bold()">
                                    <i class="bi bi-type-bold"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="italic()">
                                    <i class="bi bi-type-italic"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="underline()">
                                    <i class="bi bi-type-underline"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="strikethrough()">
                                    <i class="bi bi-type-strikethrough"></i>
                                </button>
                            </div>

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="alignText('left')">
                                    <i class="bi bi-text-left"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="alignText('center')">
                                    <i class="bi bi-text-center"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="alignText('right')">
                                    <i class="bi bi-text-right"></i>
                                </button>
                            </div>

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="toggleList('ul')">
                                    <i class="bi bi-list-ul"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="toggleList('ol')">
                                    <i class="bi bi-list-ol"></i>
                                </button>
                            </div>

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="insertImageBase64()">
                                    <i class="bi bi-image"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="insertTable()">
                                    <i class="bi bi-table"></i>
                                </button>
                                <button class="btn btn-outline-primary" onclick="addLink()">
                                    <i class="bi bi-link-45deg"></i>
                                </button>
                                <button class="btn btn-outline-primary" onclick="openButtonModal()">
                                    <i class="bi bi-node-plus"></i>
                                </button>
                            </div>

                            <button class="btn btn-dark show-code">&lt;/&gt;</button>

                        </div>
                    </div>

                    <div class="card-body">
                        <div id="body-editor" contenteditable="true" class="form-control editor-section"
                            style="min-height:400px;">
                        </div>
                    </div>
                </div>
            </div>
            <!-- PIE DE PÁGINA -->
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-light fw-semibold">
                        Pie de página
                    </div>
                    <!-- TOOLBAR -->
                    <div class="card-body border-bottom bg-white">
                        <div class="btn-toolbar gap-2 flex-wrap">

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="undo()">
                                    <i class="bi bi-arrow-counterclockwise"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="redo()">
                                    <i class="bi bi-arrow-clockwise"></i>
                                </button>
                            </div>

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="clearFormattingToParagraph()">
                                    <i class="bi bi-eraser"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="bold()">
                                    <i class="bi bi-type-bold"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="italic()">
                                    <i class="bi bi-type-italic"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="underline()">
                                    <i class="bi bi-type-underline"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="strikethrough()">
                                    <i class="bi bi-type-strikethrough"></i>
                                </button>
                            </div>

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="alignText('left')">
                                    <i class="bi bi-text-left"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="alignText('center')">
                                    <i class="bi bi-text-center"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="alignText('right')">
                                    <i class="bi bi-text-right"></i>
                                </button>
                            </div>

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="toggleList('ul')">
                                    <i class="bi bi-list-ul"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="toggleList('ol')">
                                    <i class="bi bi-list-ol"></i>
                                </button>
                            </div>

                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="insertImageBase64()">
                                    <i class="bi bi-image"></i>
                                </button>
                                <button class="btn btn-outline-secondary" onclick="insertTable()">
                                    <i class="bi bi-table"></i>
                                </button>
                                <button class="btn btn-outline-primary" onclick="addLink()">
                                    <i class="bi bi-link-45deg"></i>
                                </button>
                                <button class="btn btn-outline-primary" onclick="openButtonModal()">
                                    <i class="bi bi-node-plus"></i>
                                </button>
                            </div>

                            <button class="btn btn-dark show-code">&lt;/&gt;</button>

                        </div>
                    </div>

                    <div class="card-body">
                        <div id="footer-editor" contenteditable="true" class="form-control editor-section"
                            style="min-height:150px;">
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>
    <!-- PREVISUALIZADOR -->
    <div class="row mt-4">
        <div class="col-12">
            <div class="card shadow-lg">
                <div class="card-header bg-dark text-white fw-semibold">
                    Previsualización PDF
                </div>
                <div class="card-body bg-light">

                    <div id="pdf-preview" class="pdf-preview-area">
                        <!-- Aquí se inyectará el contenido combinado -->
                    </div>

                </div>
            </div>
        </div>
    </div>
    <!-- Modal -->
    <div class="modal fade" id="buttonModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Insertar Botón</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <!-- Nombre del botón -->
                    <div class="mb-3">
                        <label class="form-label">Texto del botón</label>
                        <input type="text" id="btnLabel" class="form-control" placeholder="Ej: Firmar Documento">
                    </div>
                    <!-- Acción -->
                    <div class="mb-3">
                        <label class="form-label">Acción</label>
                        <select id="btnAction" class="form-select">
                            <option value="firmaDigital">Firma Digital</option>
                            <option value="adjuntarDocumento">Adjuntar Documento</option>
                            <option value="otros">Otros</option>
                        </select>
                    </div>
                    <!-- Color -->
                    <div class="mb-3">
                        <label class="form-label">Color del botón</label>

                        <div class="d-flex gap-3">

                            <div>
                                <input type="radio" name="btnColor" value="btn-primary" checked>
                                <label>Azul</label>
                            </div>

                            <div>
                                <input type="radio" name="btnColor" value="btn-success">
                                <label>Verde</label>
                            </div>

                            <div>
                                <input type="radio" name="btnColor" value="btn-danger">
                                <label>Rojo</label>
                            </div>

                            <div>
                                <input type="radio" name="btnColor" value="btn-warning">
                                <label>Amarillo</label>
                            </div>

                        </div>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="button" class="btn btn-primary" onclick="insertButton()">
                        Insertar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/compressorjs@1.2.1/dist/compressor.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
